# Render Blueprint — deploys the whole eHealth System.
# Backend + frontend on Render, database on Neon.
#
# After the first deploy, note the generated URLs:
#   Backend : https://digital-health-record-system-2.onrender.com
#   Frontend: https://digital-health-record-system-3.onrender.com
# The QR codes rendered by the app use `window.location.origin`, i.e. the
# FRONTEND URL above, so scanning them on a phone opens the public profile
# on the deployed site.

services:
  # ── Django REST API ───────────────────────────────────────────────────────
  - type: web
    name: digital-health-record-system-2
    runtime: python
    rootDir: EHEALTH-SYSTEM/backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --timeout 120
    releaseCommand: python manage.py migrate --noinput
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_wsjcSKaF9d7N@ep-delicate-rice-aucp5h61-pooler.c-10.us-east-1.aws.neon.tech/neondb?sslmode=require
      # Allow the deployed React frontend to call this API (CORS).
      - key: FRONTEND_URL
        value: https://digital-health-record-system-3.onrender.com 
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: kripashrestha180@gmail.com
      - key: EMAIL_HOST_PASSWORD
        value: obbjujsnqkjvegqb
      - key: EMAIL_USE_TLS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: kripashrestha180@gmail.com
      - key: RENDER_EXTERNAL_HOSTNAME
        value: digital-health-record-system-2.onrender.com
      # Gmail API credentials (bypasses Render's SMTP block — uses HTTPS)
      # See: EHEALTH-SYSTEM/backend/core/get_refresh_token.py for setup instructions
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
      - key: GOOGLE_REFRESH_TOKEN
        value: ""

  # ── React (Vite) SPA, served as a static site ─────────────────────────────
  - type: web
    name: digital-health-record-system-3
    runtime: static
    rootDir: EHEALTH-SYSTEM/frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Points the built app at the deployed backend. Must end with /api.
      - key: VITE_API_URL
        value: https://digital-health-record-system-2.onrender.com/api
    # SPA deep links (e.g. /shared-profile/<token>) must serve index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
